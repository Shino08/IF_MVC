<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/output.css">
    <link rel="stylesheet" href="./css/styles.css">
    
    <title>Crear Cuenta - InstalFuego</title>
</head>

<body>
    <div class="min-h-screen flex items-center justify-center p-4 bg-gray-50 text-gray-800 background">

        <div class="w-full max-w-2xl">

            <div class="bg-white rounded-2xl shadow-xl p-8">

                <div class="text-center mb-8">
                    <img src="./css/img/4 - Copy.png" alt="InstalFuego Logo" class="h-24 mx-auto mb-6 object-contain">
                </div>
                
                <div class="text-center mb-8">
                    <h1 class="text-2xl font-bold text-gray-800 mb-2">Crear Cuenta</h1>
                    <p class="text-gray-500 text-lg">Complete el formulario para registrarse</p>
                </div>

                <form class="space-y-5">
                    
                    <!-- Información Personal -->
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                        <div>
                            <label for="firstName" class="block text-sm font-medium text-gray-700 mb-2">
                                Nombre
                            </label>
                            <input type="text" id="firstName" name="firstName" placeholder="Ingrese su nombre"
                                class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-lg outline-none transition duration-200 focus:ring-2 focus:ring-primary focus:border-transparent focus:bg-white"
                                required>
                        </div>

                        <div>
                            <label for="lastName" class="block text-sm font-medium text-gray-700 mb-2">
                                Apellido
                            </label>
                            <input type="text" id="lastName" name="lastName" placeholder="Ingrese su apellido"
                                class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-lg outline-none transition duration-200 focus:ring-2 focus:ring-primary focus:border-transparent focus:bg-white"
                                required>
                        </div>
                    </div>

                    <!-- Email y Teléfono -->
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                        <div>
                            <label for="email" class="block text-sm font-medium text-gray-700 mb-2">
                                Correo Electrónico
                            </label>
                            <input type="email" id="email" name="email" placeholder="correo@ejemplo.com"
                                class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-lg outline-none transition duration-200 focus:ring-2 focus:ring-primary focus:border-transparent focus:bg-white"
                                required>
                        </div>

                        <div>
                            <label for="phone" class="block text-sm font-medium text-gray-700 mb-2">
                                Teléfono
                            </label>
                            <input type="tel" id="phone" name="phone" placeholder="+58 412-1234567"
                                class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-lg outline-none transition duration-200 focus:ring-2 focus:ring-primary focus:border-transparent focus:bg-white"
                                required>
                        </div>
                    </div>

                    <!-- Tipo de Cliente -->
                    <div>
                        <label for="customerType" class="block text-sm font-medium text-gray-700 mb-2">
                            Tipo de Cliente
                        </label>
                        <select id="customerType" name="customerType"
                            class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-lg outline-none transition duration-200 focus:ring-2 focus:ring-primary focus:border-transparent focus:bg-white"
                            required>
                            <option value="">Seleccione una opción</option>
                            <option value="individual">Persona Natural</option>
                            <option value="company">Empresa</option>
                        </select>
                    </div>

                    <!-- Empresa (condicional) -->
                    <div id="companyFields" class="space-y-5 hidden">
                        <div>
                            <label for="companyName" class="block text-sm font-medium text-gray-700 mb-2">
                                Nombre de la Empresa
                            </label>
                            <input type="text" id="companyName" name="companyName" placeholder="Ingrese el nombre de su empresa"
                                class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-lg outline-none transition duration-200 focus:ring-2 focus:ring-primary focus:border-transparent focus:bg-white">
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                            <div>
                                <label for="rif" class="block text-sm font-medium text-gray-700 mb-2">
                                    RIF
                                </label>
                                <input type="text" id="rif" name="rif" placeholder="J-12345678-9"
                                    class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-lg outline-none transition duration-200 focus:ring-2 focus:ring-primary focus:border-transparent focus:bg-white">
                            </div>

                            <div>
                                <label for="industry" class="block text-sm font-medium text-gray-700 mb-2">
                                    Sector
                                </label>
                                <select id="industry" name="industry"
                                    class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-lg outline-none transition duration-200 focus:ring-2 focus:ring-primary focus:border-transparent focus:bg-white">
                                    <option value="">Seleccione un sector</option>
                                    <option value="construccion">Construcción</option>
                                    <option value="manufactura">Manufactura</option>
                                    <option value="comercio">Comercio</option>
                                    <option value="servicios">Servicios</option>
                                    <option value="hospitality">Hotelería y Restaurantes</option>
                                    <option value="otro">Otro</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <!-- Dirección -->
                    <div>
                        <label for="address" class="block text-sm font-medium text-gray-700 mb-2">
                            Dirección
                        </label>
                        <textarea id="address" name="address" rows="2" placeholder="Ingrese su dirección completa"
                            class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-lg outline-none transition duration-200 focus:ring-2 focus:ring-primary focus:border-transparent focus:bg-white resize-none"
                            required></textarea>
                    </div>

                    <!-- Ciudad y Estado -->
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                        <div>
                            <label for="city" class="block text-sm font-medium text-gray-700 mb-2">
                                Ciudad
                            </label>
                            <input type="text" id="city" name="city" placeholder="Ciudad"
                                class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-lg outline-none transition duration-200 focus:ring-2 focus:ring-primary focus:border-transparent focus:bg-white"
                                required>
                        </div>

                        <div>
                            <label for="state" class="block text-sm font-medium text-gray-700 mb-2">
                                Estado
                            </label>
                            <select id="state" name="state"
                                class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-lg outline-none transition duration-200 focus:ring-2 focus:ring-primary focus:border-transparent focus:bg-white"
                                required>
                                <option value="">Seleccione un estado</option>
                                <option value="carabobo">Carabobo</option>
                                <option value="miranda">Miranda</option>
                                <option value="zulia">Zulia</option>
                                <option value="lara">Lara</option>
                                <option value="aragua">Aragua</option>
                                <!-- Agregar más estados según sea necesario -->
                            </select>
                        </div>
                    </div>

                    <!-- Contraseña -->
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                        <div>
                            <label for="password" class="block text-sm font-medium text-gray-700 mb-2">
                                Contraseña
                            </label>
                            <input type="password" id="password" name="password" placeholder="Mínimo 8 caracteres"
                                class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-lg outline-none transition duration-200 focus:ring-2 focus:ring-primary focus:border-transparent focus:bg-white"
                                required>
                        </div>

                        <div>
                            <label for="confirmPassword" class="block text-sm font-medium text-gray-700 mb-2">
                                Confirmar Contraseña
                            </label>
                            <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Confirme su contraseña"
                                class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-lg outline-none transition duration-200 focus:ring-2 focus:ring-primary focus:border-transparent focus:bg-white"
                                required>
                        </div>
                    </div>

                    <!-- Términos y Condiciones -->
                    <div class="flex items-start">
                        <input type="checkbox" id="terms" name="terms"
                            class="mt-1 w-4 h-4 text-primary border-gray-300 rounded focus:ring-2 focus:ring-primary"
                            required>
                        <label for="terms" class="ml-3 text-sm text-gray-600">
                            Acepto los <a href="#" class="text-primary font-semibold hover:text-primary-dark">Términos y Condiciones</a> 
                            y la <a href="#" class="text-primary font-semibold hover:text-primary-dark">Política de Privacidad</a>
                        </label>
                    </div>

                    <!-- Newsletter -->
                    <div class="flex items-start">
                        <input type="checkbox" id="newsletter" name="newsletter"
                            class="mt-1 w-4 h-4 text-primary border-gray-300 rounded focus:ring-2 focus:ring-primary">
                        <label for="newsletter" class="ml-3 text-sm text-gray-600">
                            Deseo recibir ofertas y novedades por correo electrónico
                        </label>
                    </div>

                    <button type="submit"
                        class="w-full bg-[#0D0D0D] text-white py-3.5 px-4 rounded-lg font-semibold shadow-md hover:shadow-lg transform hover:scale-[1.02] transition duration-200 mt-6 btn">
                        Crear Cuenta
                    </button>
                </form>

                <div class="mt-8 text-center">
                    <p class="text-sm text-gray-600">
                        ¿Ya tienes cuenta?
                        <a href="#" class="font-semibold text-primary hover:text-primary-dark transition ml-1">
                            Inicia Sesión
                        </a>
                    </p>
                </div>

                <div class="text-center mt-6">
                    <p class="text-sm font-extrabold text-footer">
                        © 2026 InstalFuego.
                    </p>
                </div>
            </div>

        </div>
    </div>

    <script>
        // Mostrar/ocultar campos de empresa según el tipo de cliente
        document.getElementById('customerType').addEventListener('change', function() {
            const companyFields = document.getElementById('companyFields');
            if (this.value === 'company') {
                companyFields.classList.remove('hidden');
            } else {
                companyFields.classList.add('hidden');
            }
        });
    </script>
</body>
</html>
